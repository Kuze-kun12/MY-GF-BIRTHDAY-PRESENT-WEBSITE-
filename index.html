<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@4.6.2/dist/index.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/twemoji@14/dist/twemoji.css">
<script src="https://cdn.jsdelivr.net/npm/twemoji@14/dist/twemoji.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at top,#ff9a9e,#fad0c4,#ffdde1);
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
overflow:hidden;
color:white;
position:relative;
}

body::after{
content:'✨ 💕 ✨ 🎉 ✨ 💕 ✨ 🎂 ✨ 💕 ✨';
position:fixed;
top:10px;
left:0;
width:100%;
text-align:center;
font-size:18px;
opacity:0.6;
z-index:0;
pointer-events:none;
letter-spacing:15px;
animation: decorFloat 8s ease-in-out infinite;
}

@keyframes decorFloat{
0%, 100%{transform:translateY(0px);}
50%{transform:translateY(-8px);}
}

body::before{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1), transparent),
            radial-gradient(circle at 80% 80%, rgba(255,255,255,0.05), transparent);
pointer-events:none;
z-index:1;
}

/* MAIN */
.container{
text-align:center;
width:100%;
max-width:750px;
padding:40px;
display:flex;
flex-direction:column;
align-items:center;
position:relative;
z-index:2;
animation: slideInDown 0.8s ease-out;
background:linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,200,220,0.1) 100%);
border-radius:30px;
backdrop-filter:blur(8px);
box-shadow:0 8px 32px rgba(255,77,109,0.2);
border:1px solid rgba(255,255,255,0.3);
}

h1{
font-size:56px;
margin-bottom:30px;
font-weight:700;
letter-spacing:3px;
background:linear-gradient(135deg, #ff1e56 0%, #ff4d6d 50%, #ff8fab 100%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
text-shadow:0 8px 20px rgba(255,77,109,0.3);
filter:drop-shadow(0 4px 12px rgba(255,30,86,0.25));
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
position:relative;
padding:20px;
border-top:3px solid rgba(255,255,255,0.4);
border-bottom:3px solid rgba(255,255,255,0.4);
}

@keyframes glow{
from{ text-shadow:0 0 10px #ff4d6d, 0 0 20px rgba(255,77,109,0.5); }
to{ text-shadow:0 0 25px #ff1e56, 0 0 40px rgba(255,30,86,0.7); }
}

@keyframes float{
0%, 100%{ transform:translateY(0px); }
50%{ transform:translateY(-15px); }
}

@keyframes slideInDown{
from{ opacity:0; transform:translateY(-30px); }
to{ opacity:1; transform:translateY(0); }
}

/* INPUT */
.input-box{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
animation: fadeInUp 1s ease-out 0.3s both;
}

input{
width:260px;
padding:14px 18px;
border:2px solid rgba(255,255,255,0.3);
border-radius:50px;
text-align:center;
font-size:16px;
background:rgba(255,255,255,0.25);
color:white;
outline:none;
transition: all 0.3s ease;
backdrop-filter: blur(5px);
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

input::placeholder{
color:rgba(255,255,255,0.7);
}

input:hover{
background:rgba(255,255,255,0.35);
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(255,77,109,0.4), 0 0 15px rgba(255,77,109,0.2);
border-color:rgba(255,255,255,0.5);
}

input:focus{
background:rgba(255,255,255,0.4);
transform:scale(1.02);
box-shadow:0 8px 30px rgba(255,77,109,0.5), inset 0 0 10px rgba(255,255,255,0.2);
border-color:rgba(255,255,255,0.6);
}

button{
padding:14px 26px;
border:none;
border-radius:50px;
background:linear-gradient(135deg,#ff4d6d,#ff1e56);
color:white;
font-weight:bold;
cursor:pointer;
transition: all 0.3s ease;
box-shadow:0 4px 15px rgba(255,77,109,0.4), 0 0 20px rgba(255,77,109,0.2);
position:relative;
overflow:hidden;
text-shadow:0 2px 4px rgba(0,0,0,0.2);
}

button:hover{
box-shadow:0 6px 25px rgba(255,77,109,0.6), 0 0 30px rgba(255,77,109,0.4);
background:linear-gradient(135deg,#ff1e56,#ff4d6d);
}

button::before{
content:'';
position:absolute;
top:50%;
left:50%;
width:0;
height:0;
background:rgba(255,255,255,0.3);
border-radius:50%;
transform:translate(-50%, -50%);
transition:width 0.6s, height 0.6s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 8px 25px rgba(255,77,109,0.6);
}

button:active::before{
width:300px;
height:300px;
}

#message{
margin-top:15px;
font-size:18px;
min-height:25px;
animation: fadeIn 0.5s ease-out;
text-shadow:0 2px 10px rgba(0,0,0,0.2);
padding:10px 20px;
background:linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,200,220,0.1));
border-radius:20px;
min-width:250px;
}

@keyframes fadeInUp{
from{ opacity:0; transform:translateY(20px); }
to{ opacity:1; transform:translateY(0); }
}

@keyframes fadeIn{
from{ opacity:0; }
to{ opacity:1; }
}

.hidden{display:none}

/* CAKE */
.cake-wrapper{
margin-top:40px;
display:flex;
flex-direction:column;
align-items:center;
animation: slideInUp 0.8s ease-out 0.2s both;
}

.cake{
position:relative;
width:220px;
height:200px;
filter:drop-shadow(0 10px 30px rgba(255,77,109,0.3));
animation: cakeSpin 6s ease-in-out infinite;
background:radial-gradient(circle at 50% 50%, rgba(255,255,255,0.3) 0%, transparent 70%);
border-radius:50%;
box-shadow:inset 0 0 30px rgba(255,200,220,0.2);
}

@keyframes slideInUp{
from{ opacity:0; transform:translateY(40px); }
to{ opacity:1; transform:translateY(0); }
}

@keyframes cakeSpin{
0%, 100%{ transform:rotateY(0deg) scale(1); }
50%{ transform:rotateY(5deg) scale(1.02); }
}

#cakePage h1{
margin:0 0 15px 0;
width:100%;
}

.plate{
position:absolute;
bottom:0;
width:260px;
height:24px;
background:linear-gradient(180deg, #fff 0%, #f0f0f0 100%);
border-radius:50%;
left:50%;
transform:translateX(-50%) perspective(600px) rotateX(60deg);
box-shadow:0 8px 20px rgba(0,0,0,0.15), inset 0 2px 5px rgba(255,255,255,0.8);
}

.layer{
position:absolute;
left:50%;
transform:translateX(-50%);
border-radius:15px;
box-shadow:inset 0 2px 5px rgba(0,0,0,0.1);
transition:all 0.3s ease;
}

.layer.bottom{
bottom:22px;
width:200px;
height:70px;
background:linear-gradient(135deg, #ff6b81, #ff5a7e);
animation: layerBounce 2s ease-in-out infinite 0.1s;
}

.layer.middle{
bottom:92px;
width:160px;
height:62px;
background:linear-gradient(135deg, #ff8fab, #ff7fa5);
animation: layerBounce 2s ease-in-out infinite 0.2s;
}

.layer.top{
bottom:154px;
width:120px;
height:52px;
background:linear-gradient(135deg, #ffb3c1, #ffa3b8);
animation: layerBounce 2s ease-in-out infinite 0.3s;
}

@keyframes layerBounce{
0%, 100%{ transform:translateX(-50%) translateY(0); }
50%{ transform:translateX(-50%) translateY(-8px); }
}

.candle{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:202px;
width:12px;
height:55px;
background:linear-gradient(90deg, #fffacd, #ffffe0);
border-radius:6px;
box-shadow:0 0 10px rgba(255,255,255,0.5), inset -2px 0 5px rgba(200,180,100,0.3);
animation: candleFlicker 0.5s ease-in-out infinite;
}

@keyframes candleFlicker{
0%, 100%{ filter:brightness(1); }
50%{ filter:brightness(1.1); }
}

.flame{
position:absolute;
top:-28px;
left:-12px;
width:36px;
height:40px;
background: radial-gradient(ellipse at 30% 30%, #ffff99, #fff200, #ffcc00, #ff9500, #ff6b00, #ff0000);
border-radius:50% 50% 50% 0;
transform:rotate(-45deg);
box-shadow:0 0 30px #ffaa00, 0 0 50px rgba(255,165,0,0.6), inset 0 0 20px rgba(255,255,100,0.8);
animation:flameIntense 0.15s infinite;
}

@keyframes flameIntense{
0%{ transform:rotate(-45deg) scale(1); }
25%{ transform:rotate(-40deg) scale(1.1); }
50%{ transform:rotate(-45deg) scale(1.15); }
75%{ transform:rotate(-50deg) scale(1.08); }
100%{ transform:rotate(-45deg) scale(1); }
}

.blow{
animation: blow 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards !important;
}

@keyframes blow{
0%{ transform:scale(1) rotate(-45deg); opacity:1; filter:brightness(1); }
30%{ transform:scale(1.3) rotate(-30deg) translateY(-5px); opacity:0.9; }
60%{ transform:translateX(80px) translateY(-50px) scale(0.5) rotate(20deg); opacity:0.3; }
100%{ transform:translateX(150px) translateY(-100px) scale(0) rotate(90deg); opacity:0; }
}

.romantic{
margin-top:40px;
font-size:24px;
opacity:0;
animation: fadeInRomantic 1.5s ease-out 0.5s forwards;
font-style:italic;
letter-spacing:0.5px;
text-shadow:0 2px 8px rgba(0,0,0,0.2);
padding:15px 25px;
background:linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,200,220,0.1));
border-radius:15px;
border:1px solid rgba(255,255,255,0.3);
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

@keyframes fadeInRomantic{
from{ opacity:0; transform:translateY(20px); }
to{ opacity:1; transform:translateY(0); }
}

/* CONTROLS */
.bottom-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
display:none;
justify-content:center;
gap:20px;
padding:20px;
background:linear-gradient(to top, rgba(0,0,0,0.3), rgba(0,0,0,0.1));
backdrop-filter: blur(12px);
animation: slideUp 0.6s ease-out;
z-index:10;
}

.bottom-bar button{
animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

.control-btn{
padding:14px 28px;
border:none;
border-radius:50px;
background:linear-gradient(135deg,#ff4d6d,#ff1e56);
color:white;
font-weight:bold;
cursor:pointer;
transition:all 0.3s ease;
box-shadow:0 4px 15px rgba(255,77,109,0.4), 0 0 20px rgba(255,77,109,0.3);
position:relative;
overflow:hidden;
display:flex;
align-items:center;
gap:10px;
font-size:16px;
text-shadow:0 2px 4px rgba(0,0,0,0.2);
}

.control-btn:hover{
box-shadow:0 6px 25px rgba(255,77,109,0.6), 0 0 35px rgba(255,77,109,0.5);
}

.control-btn i{
font-size:20px;
animation:iconFloat 1.5s ease-in-out infinite;
}

.control-btn:hover{
transform:translateY(-3px);
box-shadow:0 8px 25px rgba(255,77,109,0.6);
}

.control-btn:hover i{
animation:iconBounce 0.6s ease-in-out;
}

@keyframes iconFloat{
0%, 100%{ transform:translateY(0px); }
50%{ transform:translateY(-5px); }
}

@keyframes iconBounce{
0%, 100%{ transform:scale(1); }
50%{ transform:scale(1.2); }
}

.bottom-bar button:hover{
animation: none;
}

@keyframes slideUp{
from{ transform:translateY(100%); opacity:0; }
to{ transform:translateY(0); opacity:1; }
}

@keyframes popIn{
0%{ transform:scale(0) rotate(-180deg); opacity:0; }
50%{ transform:scale(1.1); }
100%{ transform:scale(1) rotate(0); opacity:1; }
}

@keyframes pulse{
0%, 100%{ transform:scale(1); }
50%{ transform:scale(1.1); }
}

/* TYPE BLOW OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(5px);
z-index:100;
animation: fadeIn 0.3s ease-out;
border:2px solid rgba(255,255,255,0.2);
}

.overlay h2{
font-size:32px;
margin-bottom:20px;
animation: bounce 0.8s ease-in-out infinite;
background:linear-gradient(135deg, #ff1e56 0%, #ff4d6d 50%, #ff8fab 100%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
padding:15px 30px;
border:2px solid rgba(255,255,255,0.2);
border-radius:20px;
}

@keyframes bounce{
0%, 100%{ transform:translateY(0); }
50%{ transform:translateY(-20px); }
}

.overlay input{
margin-top:20px;
width:260px;
animation: scaleIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

@keyframes scaleIn{
from{ transform:scale(0.8); opacity:0; }
to{ transform:scale(1); opacity:1; }
}

/* PARTY */
.particle{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
animation:explode 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
box-shadow:0 0 8px currentColor;
pointer-events:none;
z-index:5;
}

.particle::before{
content:'';
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:inherit;
animation:twinkle 1.5s ease-out forwards;
}

@keyframes explode{
0%{
transform:translate(0,0) scale(1);
opacity:1;
}
50%{
opacity:1;
}
100%{
transform:translate(var(--x),var(--y)) scale(0);
opacity:0;
}
}

@keyframes twinkle{
0%{ opacity:1; filter:brightness(1.5); }
100%{ opacity:0; filter:brightness(0.5); }
}

/* LETTER PAGE */
.letter-page{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
background:transparent;
padding:40px;
text-align:center;
overflow-y:auto;
animation: fadeIn 0.8s ease-out;
z-index:20;
}

.letter-page::before{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
pointer-events:none;
z-index:16;
}

.letter-text{
max-width:700px;
font-size:22px;
line-height:2;
white-space:pre-line;
animation: typewriterFade 0.05s steps(1) forwards;
color:white;
text-shadow:0 2px 12px rgba(0,0,0,0.8);
position:relative;
z-index:22;
padding:30px;
background:linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,200,220,0.05));
border-radius:20px;
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

@keyframes typewriterFade{
from{ opacity:0.7; }
to{ opacity:1; }
}

.skip-letter-btn{
position:absolute;
top:40px;
right:40px;
padding:12px 24px;
border:none;
border-radius:50px;
background:linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,200,220,0.1));
color:white;
cursor:pointer;
display:none;
font-size:14px;
font-weight:bold;
z-index:24;
animation: slideInUp 0.6s ease-out forwards;
box-shadow:0 4px 15px rgba(255,77,109,0.2), 0 0 20px rgba(255,77,109,0.1);
transition:all 0.3s ease;
border:2px solid rgba(255,255,255,0.3);
}

.skip-letter-btn:hover{
background:linear-gradient(135deg, rgba(255,255,255,0.35), rgba(255,200,220,0.2));
box-shadow:0 6px 25px rgba(255,77,109,0.4), 0 0 30px rgba(255,77,109,0.2);
transform:translateY(-2px);
border-color:rgba(255,255,255,0.5);
}

.done-btn{
margin-top:40px;
padding:16px 32px;
border:none;
border-radius:50px;
background:linear-gradient(135deg,#ff4d6d,#ff1e56);
color:white;
cursor:pointer;
display:none;
font-size:16px;
font-weight:bold;
position:relative;
z-index:23;
animation: slideInUp 0.6s ease-out forwards;
box-shadow:0 4px 20px rgba(255,77,109,0.4), 0 0 25px rgba(255,77,109,0.3);
transition:all 0.3s ease;
text-shadow:0 2px 4px rgba(0,0,0,0.2);
}

.done-btn:hover{
box-shadow:0 6px 30px rgba(255,77,109,0.6), 0 0 40px rgba(255,77,109,0.4);
transform:translateY(-2px);
}

/* VIDEO BACKGROUND */
#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
filter:blur(8px);
opacity:0.7;
z-index:15;
pointer-events:none;
display:none;
}

@keyframes confettiFall{
0%{
transform:translateY(0) translateX(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(var(--y)) translateX(var(--x)) rotate(720deg);
opacity:0;
}
}

@keyframes shake{
0%, 100%{ transform:translateX(0); }
20%{ transform:translateX(-10px); }
40%{ transform:translateX(10px); }
60%{ transform:translateX(-10px); }
80%{ transform:translateX(10px); }
}

@keyframes fadeOut{
from{ opacity:1; transform:scale(1); }
to{ opacity:0; transform:scale(0.95); }
}

@keyframes slideDown{
from{ opacity:1; transform:translateY(0); }
to{ opacity:0; transform:translateY(100%); }
}

/* GIFT BOX */
#giftBox{
width:160px;
height:160px;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%, -50%);
display:none;
cursor:pointer;
z-index:24;
animation: giftAppear 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
transition:all 0.3s ease;
filter:drop-shadow(0 10px 40px rgba(255,77,109,0.6));
}

#giftBox:hover{
transform:translate(-50%, -50%) scale(1.12) rotate(-8deg);
filter:drop-shadow(0 15px 50px rgba(255,77,109,0.9));
}

#giftBox button{
width:100%;
height:100%;
border:none;
background:linear-gradient(135deg, #ff1e56, #ff4d6d);
border-radius:15px;
font-size:80px;
cursor:pointer;
animation:giftBounce 0.6s ease-in-out infinite;
filter:brightness(1.1) drop-shadow(0 0 20px rgba(255,200,100,0.4)) drop-shadow(0 0 40px rgba(255,77,109,0.5));
transition:all 0.3s ease;
padding:0;
display:flex;
align-items:center;
justify-content:center;
box-shadow:inset 0 0 20px rgba(255,255,255,0.3), 0 0 25px rgba(255,77,109,0.4);
}

#giftBox:hover button{
filter:brightness(1.3) drop-shadow(0 0 40px rgba(255,100,150,0.8)) drop-shadow(0 0 60px rgba(255,77,109,0.6)) saturate(1.2);
transform:scale(1.08);
}

#giftBox::before{
content:'';
position:absolute;
top:-20px;
left:50%;
transform:translateX(-50%);
width:180px;
height:35px;
background:linear-gradient(90deg, #ffd166, #ffed4e);
border-radius:50%;
box-shadow:0 6px 15px rgba(255,209,102,0.6);
z-index:-1;
animation:ribbonWave 2s ease-in-out infinite;
}

#giftBox::after{
content:'✨';
position:absolute;
top:-30px;
right:-20px;
font-size:30px;
animation:sparkle 1s ease-in-out infinite;
}

@keyframes sparkle{
0%, 100%{ opacity:0.3; transform:scale(0.8); }
50%{ opacity:1; transform:scale(1.2); }
}

@keyframes ribbonWave{
0%, 100%{ transform:translateX(-50%) scaleX(1); }
50%{ transform:translateX(-50%) scaleX(1.1); }
}

@keyframes giftAppear{
from{ opacity:0; transform:scale(0) rotate(180deg); }
to{ opacity:1; transform:scale(1) rotate(0deg); }
}

@keyframes giftBounce{
0%, 100%{ transform:translate(-50%, -50%); }
50%{ transform:translate(-50%, -65%); }
}

@keyframes giftShake{
0%, 100%{ transform:rotate(0deg) scale(1); }
15%{ transform:rotate(-12deg) scale(1.08); }
30%{ transform:rotate(12deg) scale(1.08); }
45%{ transform:rotate(-8deg) scale(1.05); }
60%{ transform:rotate(8deg) scale(1.05); }
75%{ transform:rotate(-4deg) scale(1.02); }
90%{ transform:rotate(4deg) scale(1.02); }
}

#giftBox.shake{
animation:giftShake 0.4s ease-in-out;
}

.click-count{
position:absolute;
bottom:10px;
right:10px;
width:32px;
height:32px;
background:linear-gradient(135deg, #ff4d6d, #ff1e56);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
font-weight:bold;
backdrop-filter:blur(8px);
box-shadow:0 4px 12px rgba(255,77,109,0.6);
color:white;
border:2px solid rgba(255,255,255,0.3);
animation:countPulse 0.5s ease-out;
}

@keyframes countPulse{
0%{ transform:scale(0) rotate(-180deg); }
50%{ transform:scale(1.2); }
100%{ transform:scale(1); }
}

#surpriseMessage{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%, -50%);
background:linear-gradient(135deg, #ff1e56 0%, #ff4d6d 50%, #ff8fab 100%);
padding:50px 70px;
border-radius:25px;
font-size:28px;
font-weight:bold;
text-align:center;
display:none;
z-index:25;
animation:surpriseReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
box-shadow:0 20px 60px rgba(255,77,109,0.8), 0 0 40px rgba(255,77,109,0.4), inset 0 0 30px rgba(255,255,255,0.2);
color:white;
text-shadow:0 3px 8px rgba(0,0,0,0.3);
border:3px solid rgba(255,255,255,0.3);
backdrop-filter:blur(10px);
letter-spacing:1px;
line-height:1.6;
}

@keyframes surpriseReveal{
0%{ transform:translate(-50%, -50%) scale(0.3) rotate(-180deg); opacity:0; }
50%{ transform:translate(-50%, -50%) scale(1.15); }
100%{ transform:translate(-50%, -50%) scale(1); opacity:1; }
}

/* FULLSCREEN VIDEO */
#videoFullscreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:26;
align-items:center;
justify-content:center;
flex-direction:column;
}

#videoFullscreen video{
width:100%;
height:100%;
object-fit:contain;
filter:none;
opacity:1;
}

#videoFullscreen button{
position:absolute;
bottom:30px;
padding:12px 24px;
font-size:14px;
background:linear-gradient(135deg,#ff4d6d,#ff1e56);
border:none;
border-radius:50px;
color:white;
cursor:pointer;
z-index:27;
box-shadow:0 4px 15px rgba(0,0,0,0.5);
transition:all 0.3s ease;
}

#videoFullscreen button:hover{
transform:scale(1.1);
box-shadow:0 6px 20px rgba(0,0,0,0.7);
}

@keyframes videoFadeIn{
from{ opacity:0; }
to{ opacity:1; }
}

#videoFullscreen.show{
animation:videoFadeIn 0.5s ease-out;
display:flex;
}

/* LOVE CAMERA */
#loveCameraContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff5f9e,#ff9ac6,#ffd6e8);
font-family:sans-serif;
overflow:hidden;
cursor:pointer;
z-index:27;
}

#loveCameraContainer.show{
display:flex;
}

.love-camera-content{
text-align:center;
position:relative;
}

#emoji{
font-size:130px;
transition:1s;
}

#camera{
font-size:70px;
margin-top:20px;
opacity:0;
transform:scale(.4);
transition:0.8s;
}

.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

.flash.active{
animation:flash .4s;
}

@keyframes flash{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

.photos{
display:grid;
grid-template-columns:repeat(5, 1fr);
gap:20px;
justify-items:center;
align-items:center;
margin-top:40px;
width:100%;
max-width:900px;
margin-left:auto;
margin-right:auto;
position:relative;
perspective:1000px;
}

.polaroid{
width:120px;
height:140px;
background:white;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,.25), 0 0 30px rgba(255,77,109,0.2);
display:flex;
align-items:center;
justify-content:center;
font-size:70px;
padding-bottom:10px;
transform:translateY(-250px) rotate(-25deg) scale(0.8);
opacity:0;
border:3px solid rgba(255,255,255,0.5);
transition:all 0.3s ease;
overflow:hidden;
}

.polaroid img{
width:100%;
height:100%;
object-fit:cover;
border-radius:6px;
}

.polaroid:nth-child(1){ transform:translateY(-250px) rotate(-25deg) scale(0.8); animation-delay:0s; }
.polaroid:nth-child(2){ transform:translateY(-250px) rotate(20deg) scale(0.85); animation-delay:0.1s; }
.polaroid:nth-child(3){ transform:translateY(-250px) rotate(-15deg) scale(0.8); animation-delay:0.2s; }
.polaroid:nth-child(4){ transform:translateY(-250px) rotate(18deg) scale(0.9); animation-delay:0.3s; }
.polaroid:nth-child(5){ transform:translateY(-250px) rotate(-20deg) scale(0.85); animation-delay:0.4s; }
.polaroid:nth-child(6){ transform:translateY(-250px) rotate(22deg) scale(0.8); animation-delay:0.5s; }
.polaroid:nth-child(7){ transform:translateY(-250px) rotate(-18deg) scale(0.88); animation-delay:0.6s; }
.polaroid:nth-child(8){ transform:translateY(-250px) rotate(16deg) scale(0.82); animation-delay:0.7s; }
.polaroid:nth-child(9){ transform:translateY(-250px) rotate(-22deg) scale(0.86); animation-delay:0.8s; }
.polaroid:nth-child(10){ transform:translateY(-250px) rotate(20deg) scale(0.84); animation-delay:0.9s; }

.show{
animation:drop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes drop{
to{
transform:translateY(0) rotate(0) scale(1);
opacity:1;
}
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 6s linear infinite;
opacity:.7;
}

@keyframes float{
0%{transform:translateY(100vh) scale(.5)}
100%{transform:translateY(-10vh) scale(1.2)}
}

.replay{
position:fixed;
bottom:20px;
font-size:14px;
color:white;
opacity:.8;
}

</style>
</head>

<body>

<div class="container">

<div id="login">

<h1>Who is your baby? ❤️</h1>

<div class="input-box">
<input id="nameInput" placeholder="Type your answer...">
<button onclick="checkName()">Unlock</button>
</div>

<div id="message"></div>

</div>

<div id="cakePage" class="hidden">

<h1>Happy Birthday 😍</h1>

<div class="cake-wrapper">

<div class="cake">
<div class="layer bottom"></div>
<div class="layer middle"></div>
<div class="layer top"></div>

<div class="candle">
<div id="flame" class="flame"></div>
</div>

<div class="plate"></div>
</div>

</div>

<div id="romanticText" class="romantic">
Make a wish before the candle disappears ❤️
</div>

</div>

</div>

<div class="bottom-bar" id="controls">
<button class="control-btn" onclick="startMic()"><i class="fas fa-microphone"></i><span>Mic</span></button>
<button class="control-btn" onclick="openType()"><i class="fas fa-wind"></i><span>Type Blow</span></button>
</div>

<div class="overlay" id="overlay">
<h2>Type "blow"</h2>
<input id="blowInput">
</div>

<!-- LETTER LANDING PAGE -->
 <video id="bgVideo" muted>
<source src="video.mp4" type="video/mp4">
</video>
<div class="letter-page" id="letterPage">

<audio id="letterAudio" loop>
<source src="bahy.mp3" type="audio/mpeg">
</audio>


<button class="skip-letter-btn" id="skipLetterBtn">⏭️ Skip Letter</button>

<div class="letter-text" id="letterText"></div>

<button class="done-btn" id="doneBtn">Done Reading</button>

<div id="giftBox" onclick="handleGiftClick()">
<button>click here 😍</button>
<div class="click-count"><span id="clickCount">0</span>/3</div>
</div>

<div id="surpriseMessage"></div>

<div id="videoFullscreen">
<video id="fullscreenVideo" muted controls autoplay>
<source src="video2.mp4" type="video/mp4">
</video>
<button onclick="closeFullscreenVideo()">Close Video ✕</button>
</div>

<div id="loveCameraContainer">
<div class="love-camera-content">
<div id="emoji">🙂</div>
<div id="camera">[ ◉¯]</div>
<div class="photos" id="photos">
<div class="polaroid" id="p1"><img src="1.jpeg" alt="Photo 1"></div>
<div class="polaroid" id="p2"><img src="2.jpeg" alt="Photo 2"></div>
<div class="polaroid" id="p3"><img src="3.jpeg" alt="Photo 3"></div>
<div class="polaroid" id="p4"><img src="4.jpeg" alt="Photo 4"></div>
<div class="polaroid" id="p5"><img src="5.jpeg" alt="Photo 5"></div>
<div class="polaroid" id="p6"><img src="6.jpeg" alt="Photo 6"></div>
<div class="polaroid" id="p7"><img src="7.jpeg" alt="Photo 7"></div>
<div class="polaroid" id="p8"><img src="8.jpeg" alt="Photo 8"></div>
<div class="polaroid" id="p9"><img src="9.jpeg" alt="Photo 9"></div>
<div class="polaroid" id="p10"><img src="10.jpeg" alt="Photo 10"></div>
</div>
<video id="colorfulAudio" autoplay loop playsinline style="display:none;">
  <source src="colorful.mp4" type="video/mp4">
</video>
</div>
<div class="flash" id="flash"></div>
<div class="replay">Happy Birthday Baby 💕</div>
</div>

</div>

<script>

let attempts=0
const correct="raul a generoso"

function norm(t){
return t.toLowerCase().replace(/\s+/g," ").trim()
}

function checkName(){

let v=norm(document.getElementById("nameInput").value)
let msg=document.getElementById("message")

if(v===correct){
document.getElementById("login").classList.add("hidden")
document.getElementById("cakePage").classList.remove("hidden")
document.getElementById("controls").style.display="flex"
createBackgroundParticles()
return
}

attempts++
msg.innerText=attempts>=2?"Imposter... 💔":"Try again... 💕"
if(attempts===1) shakeElement(document.getElementById("nameInput"))
}

function shakeElement(el){
el.style.animation="none"
setTimeout(()=>{ el.style.animation="shake 0.5s ease-in-out" }, 10)
}

async function startMic(){

const stream=await navigator.mediaDevices.getUserMedia({audio:true})
const ctx=new AudioContext()
const mic=ctx.createMediaStreamSource(stream)
const analyser=ctx.createAnalyser()

mic.connect(analyser)

const data=new Uint8Array(analyser.frequencyBinCount)

function detect(){
analyser.getByteFrequencyData(data)
let vol=data.reduce((a,b)=>a+b)/data.length
if(vol>60) triggerBlow()
requestAnimationFrame(detect)
}
detect()
}

function openType(){
document.getElementById("overlay").style.display="flex"

document.getElementById("blowInput").oninput=(e)=>{
if(norm(e.target.value)==="blow"){
document.getElementById("overlay").style.display="none"
triggerBlow()
}
}
}

function triggerBlow(){

const flame=document.getElementById("flame")
flame.classList.add("blow")

// Play audio when blow is triggered
playBirthdayAudio()

setTimeout(()=>{
flame.style.display="none"
},700)

createParty()

setTimeout(showLetterPage,1800)

}

function playBirthdayAudio(){
const audio=new Audio("baby.mp3")
audio.volume=0.8
audio.play().catch(err=>console.log("Audio play failed:",err))
}

function createBackgroundParticles(){
for(let i=0;i<15;i++){
setTimeout(()=>{
let p=document.createElement("div")
p.className="particle"

p.style.left=(Math.random()*100)+"%"
p.style.top=(Math.random()*60)+"%"
p.style.background=["#ff4d6d","#ffd166","#06d6a0","#4cc9f0","#f72585"][Math.floor(Math.random()*5)]

p.style.setProperty("--x",(Math.random()*200-100)+"px")
p.style.setProperty("--y",(Math.random()*200-100)+"px")

document.body.appendChild(p)

setTimeout(()=>p.remove(),1500)
}, i*200)
}
}

function createParty(){

const colors=["#ff4d6d","#ffd166","#06d6a0","#4cc9f0","#f72585","#ff006e"]

for(let i=0;i<100;i++){

let p=document.createElement("div")
p.className="particle"

p.style.left="50%"
p.style.top="50%"
p.style.background=colors[Math.floor(Math.random()*colors.length)]

const angle=(i/100)*Math.PI*2
const velocity=150+Math.random()*200
p.style.setProperty("--x",Math.cos(angle)*velocity+"px")
p.style.setProperty("--y",Math.sin(angle)*velocity+"px")

document.body.appendChild(p)

setTimeout(()=>p.remove(),1500)
}

createConfetti()
}

function createConfetti(){
for(let i=0;i<40;i++){
setTimeout(()=>{
let c=document.createElement("div")
c.className="particle"
c.style.left=(Math.random()*100)+"%"
c.style.top="-10px"
c.style.background=["#ff4d6d","#ffd166","#06d6a0","#ff006e"][Math.floor(Math.random()*4)]
c.style.width=(4+Math.random()*8)+"px"
c.style.height=c.style.width
c.style.borderRadius="50%"

const xVelocity=(Math.random()*300-150)+"px"
const yVelocity=(200+Math.random()*300)+"px"
const rotation=(Math.random()*720)+"deg"

c.style.setProperty("--x",xVelocity)
c.style.setProperty("--y",yVelocity)
c.style.animation=`confettiFall 2s ease-in forwards`

document.body.appendChild(c)

setTimeout(()=>c.remove(),2000)
}, i*30)
}
}

/* LETTER TYPEWRITER */

const letter=`

Happy birthday, my baby. Today is your special day, and I just want you to know how thankful I am that you exist in my life. Kahit malayo tayo sa isa’t isa, you still make my days feel complete.

Every time I think about you, napapangiti ako. You are not just my girlfriend, you are my comfort, my safe place, and the person who makes my life brighter.
I know our relationship is not always easy, especially because we are far from each other. Pero kahit ganoon, I will always choose you. Distance may separate us physically, but it will never change how much you mean to me.
On your birthday, I hope you feel how loved you are. I hope today brings you happiness, peace, and all the things your heart wishes for. You deserve so many beautiful things in this world.

Thank you for being patient with me, for loving me, and for staying with me through everything. I promise I will continue doing my best to make you happy.
I may not be there beside you today, but my heart is always with you. One day, we will celebrate birthdays together without distance between us.
Again, happy birthday, my baby. I love you so much. Always remember that no matter what happens, you will always have someone who believes in you and loves you deeply.

Happy birthday, my baby.`

let i=0
let giftClickCount=0

function showLetterPage(){

const cakePage=document.getElementById("cakePage")
const controls=document.getElementById("controls")
const letterPage=document.getElementById("letterPage")
const bgVideo=document.getElementById("bgVideo")
const doneBtn=document.getElementById("doneBtn")

cakePage.style.animation="fadeOut 0.6s ease-in forwards"
controls.style.animation="slideDown 0.6s ease-in forwards"

setTimeout(()=>{
cakePage.style.display="none"
controls.style.display="none"
letterPage.style.display="flex"
bgVideo.style.display="block"
bgVideo.play()

// Play letter audio
const letterAudio=document.getElementById("letterAudio")
letterAudio.play().catch(err=>console.log("Audio play failed:",err))

bgVideo.addEventListener('ended', ()=>{
bgVideo.currentTime=0
bgVideo.play()
})

if(!doneBtn.hasClickListener){
doneBtn.addEventListener('click', ()=>{
bgVideo.pause()
letterAudio.pause()
letterAudio.currentTime=0
})
const skipBtn=document.getElementById("skipLetterBtn")
if(skipBtn && !skipBtn.hasClickListener){
skipBtn.addEventListener('click', ()=>{
bgVideo.pause()
letterAudio.pause()
letterAudio.currentTime=0
})
skipBtn.hasClickListener=true
}
doneBtn.hasClickListener=true
}

createBackgroundParticles()
typeLetter()
},1000)

}

function typeLetter(){

let box=document.getElementById("letterText")

if(i<letter.length){
const char=letter.charAt(i)
const span=document.createElement("span")
span.textContent=char
span.style.animation=`fadeIn 0.3s ease-out`
if(char==='\n') box.appendChild(document.createElement("br"))
else box.appendChild(span)
i++
setTimeout(typeLetter,10)
}else{
setTimeout(()=>{
document.getElementById("doneBtn").style.display="inline-block"
document.getElementById("skipLetterBtn").style.display="inline-block"

document.getElementById("doneBtn").onclick=()=>{
const letterText=document.getElementById("letterText")
const bgVideo=document.getElementById("bgVideo")
const giftBox=document.getElementById("giftBox")
const doneBtn=document.getElementById("doneBtn")
const skipBtn=document.getElementById("skipLetterBtn")

// Fade out letter and video
letterText.style.animation="fadeOut 0.8s ease-in forwards"
bgVideo.style.animation="fadeOut 0.8s ease-in forwards"
doneBtn.style.animation="fadeOut 0.6s ease-in forwards"
skipBtn.style.animation="fadeOut 0.6s ease-in forwards"

// Show gift with delay and animation
setTimeout(()=>{
giftBox.style.display="block"
showSurpriseMessage("Your gift awaits... 💝", 2500)
}, 600)

doneBtn.style.opacity="0.5"
doneBtn.style.pointerEvents="none"
skipBtn.style.opacity="0.5"
skipBtn.style.pointerEvents="none"
}

document.getElementById("skipLetterBtn").onclick=()=>{
const letterText=document.getElementById("letterText")
const bgVideo=document.getElementById("bgVideo")
const doneBtn=document.getElementById("doneBtn")
const skipBtn=document.getElementById("skipLetterBtn")

// Fade out letter and video
letterText.style.animation="fadeOut 0.8s ease-in forwards"
bgVideo.style.animation="fadeOut 0.8s ease-in forwards"
doneBtn.style.animation="fadeOut 0.6s ease-in forwards"
skipBtn.style.animation="fadeOut 0.6s ease-in forwards"

// Skip directly to final surprise
setTimeout(()=>{
giftClickCount=3
revealFinalSurprise()
}, 600)

doneBtn.style.opacity="0.5"
doneBtn.style.pointerEvents="none"
skipBtn.style.opacity="0.5"
skipBtn.style.pointerEvents="none"
}
},500)
}

}

function handleGiftClick(){
giftClickCount++
const clickSpan=document.getElementById("clickCount")
clickSpan.innerText=giftClickCount

const giftBox=document.getElementById("giftBox")
giftBox.classList.add("shake")

// Animate the click counter
const countEl=clickSpan.parentElement
countEl.style.animation="none"
setTimeout(()=>{ countEl.style.animation="countPulse 0.5s ease-out" }, 10)

setTimeout(()=>giftBox.classList.remove("shake"), 400)

if(giftClickCount===1){
showSurpriseMessage("💋 Click me again!", 2000)
}else if(giftClickCount===2){
showSurpriseMessage("😍 One more time...", 2000)
}else if(giftClickCount===3){
revealFinalSurprise()
}
}

function showSurpriseMessage(text, duration){
const msg=document.getElementById("surpriseMessage")
msg.innerText=text
msg.style.display="block"

setTimeout(()=>{
msg.style.display="none"
}, duration)
}

function revealFinalSurprise(){
const videoFullscreen=document.getElementById("videoFullscreen")
const fullscreenVideo=document.getElementById("fullscreenVideo")
const msg=document.getElementById("surpriseMessage")
const giftBox=document.getElementById("giftBox")

giftBox.style.animation="giftShake 0.6s ease-in-out infinite"

msg.innerText="🎉 YOU DID IT! 🎉\n\n💕 I Love You So Much! 💕"
msg.style.display="block"
msg.style.fontSize="28px"
msg.style.fontWeight="bold"

createFinalConfetti()

setTimeout(()=>{
msg.style.display="none"
videoFullscreen.classList.add("show")
fullscreenVideo.currentTime=0
fullscreenVideo.play()
}, 2500)

setTimeout(()=>{
giftBox.style.display="none"
document.getElementById("doneBtn").style.display="none"
}, 3000)
}

function closeFullscreenVideo(){
const videoFullscreen=document.getElementById("videoFullscreen")
const fullscreenVideo=document.getElementById("fullscreenVideo")
videoFullscreen.classList.remove("show")
fullscreenVideo.pause()

// Trigger love camera after a short delay
setTimeout(()=>{
startLoveCamera()
}, 500)
}

function startLoveCamera(){
const container=document.getElementById("loveCameraContainer")
container.classList.add("show")
runLoveCamera()
}

function createFinalConfetti(){
for(let i=0;i<50;i++){
setTimeout(()=>{
let c=document.createElement("div")
c.className="particle"
c.style.left=(Math.random()*100)+"%"
c.style.top="-10px"
c.style.background=["#ff4d6d","#ffd166","#06d6a0","#ff006e","#4cc9f0"][Math.floor(Math.random()*5)]
c.style.width=(6+Math.random()*10)+"px"
c.style.height=c.style.width
c.style.borderRadius="50%"

const xVelocity=(Math.random()*400-200)+"px"
const yVelocity=(300+Math.random()*300)+"px"

c.style.setProperty("--x",xVelocity)
c.style.setProperty("--y",yVelocity)
c.style.animation=`confettiFall 2.5s ease-in forwards`

document.body.appendChild(c)

setTimeout(()=>c.remove(),2500)
}, i*40)
}
}

/* LOVE CAMERA */

function runLoveCamera(){

const emoji=document.getElementById("emoji")
const camera=document.getElementById("camera")
const flash=document.getElementById("flash")
const polaroids=document.querySelectorAll(".polaroid")
const container=document.getElementById("loveCameraContainer")
const colorfulAudio=document.getElementById("colorfulAudio")

// Start playing music
colorfulAudio.play().catch(err=>console.log("Audio play failed:", err))

function start(){

emoji.textContent="🙂"
camera.style.opacity=0
polaroids.forEach(p=>p.classList.remove("show"))

setTimeout(()=>{
emoji.textContent="😍"
},1200)

setTimeout(()=>{
camera.style.opacity=1
camera.style.transform="scale(1)"
},2200)

setTimeout(()=>{
flash.classList.add("active")
},3000)

setTimeout(()=>{
flash.classList.remove("active")
polaroids.forEach(p=>p.classList.add("show"))
},3200)

}

container.onclick=start

start()

function hearts(){
const heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"
heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(15+Math.random()*25)+"px"
heart.style.animationDuration=(4+Math.random()*4)+"s"
container.appendChild(heart)

setTimeout(()=>heart.remove(),7000)
}

setInterval(hearts,400)

}

</script>
